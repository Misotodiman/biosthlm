name: Bygg biosthlm

on:
  schedule:
    - cron: '17 4 * * *'  # 04:17 UTC = 06:17 sommartid / 05:17 vintertid
  workflow_dispatch:      # tillåter manuell körning från GitHub-sajten

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checka ut koden
        uses: actions/checkout@v4
        with:
          # Behövs för att kunna pusha tillbaka scraper-cache
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Installera Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installera beroenden
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 jinja2 playwright
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: Kör skriptet
        env:
          TMDB_API_TOKEN: ${{ secrets.TMDB_API_TOKEN }}
        run: python main.py --days 5 --include-filmstaden --no-history 2>&1 | tee build.log

      - name: Commita scraper-cache tillbaka
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Lägg till bara cache-filerna (inte HTML-output etc.)
          # `|| true` så att stegget inte failar om filerna saknas
          git add output/scraper_history.json output/poster_cache.json 2>/dev/null || true

          if git diff --staged --quiet 2>/dev/null; then
            echo "Inga ändringar i scraper-cache."
          else
            # [skip ci] förhindrar att committen triggar en ny workflow-körning
            git commit -m "Uppdatera scraper-cache [skip ci]"
            git push
          fi

      - name: Kolla efter scraper-fel
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Plocka ut alla [FEL]- och [TOMT]-rader
          # [FEL]  = scraper kastade exception (timeout, parse-fel)
          # [TOMT] = scraper returnerade 0 visningar trots tidigare data (silent failure)
          ERRORS=$(grep -E '^\[(FEL|TOMT)\]' build.log || true)
          if [ -z "$ERRORS" ]; then
            echo "Inga scraper-fel idag."
            exit 0
          fi

          # Bygg issue-titel med dagens datum
          TODAY=$(date -u +%Y-%m-%d)
          TITLE="Scraper-fel $TODAY"

          # Kolla om det redan finns en öppen issue med samma titel
          EXISTING=$(gh issue list --state open --search "$TITLE" --json number --jq '.[0].number' || true)
          if [ -n "$EXISTING" ]; then
            echo "Issue #$EXISTING finns redan, hoppar över."
            exit 0
          fi

          # Bygg body med både [FEL] och [TOMT] ihopgrupperade
          FEL_LINES=$(grep '^\[FEL\]' build.log || true)
          TOMT_LINES=$(grep '^\[TOMT\]' build.log || true)

          BODY="Scraper-problem vid körningen $TODAY:"$'\n\n'

          if [ -n "$FEL_LINES" ]; then
            BODY="${BODY}### Krascher (exceptions)"$'\n\n'"\`\`\`"$'\n'"${FEL_LINES}"$'\n'"\`\`\`"$'\n\n'
          fi

          if [ -n "$TOMT_LINES" ]; then
            BODY="${BODY}### Silent failures (0 visningar)"$'\n\n'"\`\`\`"$'\n'"${TOMT_LINES}"$'\n'"\`\`\`"$'\n\n'
            BODY="${BODY}_Silent failure betyder att scrapern körde utan att krascha men returnerade 0 visningar trots att den tidigare hade data. Troligen har sajten ändrat HTML-struktur._"$'\n\n'
          fi

          BODY="${BODY}Se [Actions-loggen](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) för detaljer."

          # Skapa issue
          gh issue create --title "$TITLE" --body "$BODY"

      - name: Förbered Pages-mapp
        run: |
          mkdir -p _site
          cp output/biosthlm.html _site/index.html

      - name: Ladda upp till Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Publicera till Pages
        id: deployment
        uses: actions/deploy-pages@v4
