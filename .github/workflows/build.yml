name: Bygg biosthlm

on:
  schedule:
    - cron: '17 5 * * *'  # 05:17 UTC = 06:17 svensk vintertid / 07:17 sommartid
  workflow_dispatch:      # tillåter manuell körning från GitHub-sajten

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checka ut koden
        uses: actions/checkout@v4

      - name: Installera Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installera beroenden
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 jinja2 playwright
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: Kör skriptet
        env:
          TMDB_API_TOKEN: ${{ secrets.TMDB_API_TOKEN }}
        run: python main.py --days 5 --include-filmstaden --no-history

      - name: Förbered Pages-mapp
        run: |
          mkdir -p _site
          cp output/biosthlm.html _site/index.html

      - name: Ladda upp till Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Publicera till Pages
        id: deployment
        uses: actions/deploy-pages@v4
